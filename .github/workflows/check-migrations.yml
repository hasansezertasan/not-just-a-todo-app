---
name: Alembic Migration Check
on:
  pull_request:
  push:
    branches: [main]
jobs:
  migrations:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --no-dev --frozen
      - name: Apply existing migrations to a fresh DB
        env:
          SESSION_SECRET_KEY: ci-test-key
          SQLALCHEMY_DATABASE_URL: sqlite:///ci.sqlite3
        run: uv run flask db upgrade
      - name: Detect un-migrated model changes
        env:
          SESSION_SECRET_KEY: ci-test-key
          SQLALCHEMY_DATABASE_URL: sqlite:///ci.sqlite3
        # `flask db check` exits non-zero if the live schema diverges from
        # the model definitions — i.e. someone changed a model without
        # generating a migration.
        run: uv run flask db check
