---
name: Weekly Image Rebuild
on:
  schedule:
    # Picks up base-image (python:3.14-slim-bookworm) security patches even
    # when no commits land. New CVEs in the base layer otherwise persist
    # until the next code change.
    - cron: "0 7 * * 1"
  workflow_dispatch:
jobs:
  rebuild:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Force fresh base layer pull so weekly run actually picks up
          # upstream security patches.
          pull: true
          no-cache: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:weekly
            ghcr.io/${{ github.repository }}:weekly-${{ github.run_number }}
